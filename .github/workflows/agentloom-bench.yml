name: agentloom-bench

# Defensive CI for the τ-bench × Agentloom integration. Runs:
#  - on every PR touching agentloom_bench/, backend/vendor/tau_bench/,
#    or backend/agentloom/benchmarks/ → catch upstream sha drift +
#    runner regressions before merge.
#  - weekly cron + manual workflow_dispatch → catch upstream tau_bench
#    pip-install drift, litellm provider API changes, etc. Even with
#    no live LLM calls, this exercises the vendor patches + the
#    upstream import path (UserStrategy / Env construction).
#
# A real benchmark cron (5 tasks against a deployed backend) is gated
# on the BACKEND_URL repo secret; if absent (the default), the live
# job is skipped so forks / pre-deployment branches stay green.

on:
  pull_request:
    paths:
      - 'agentloom_bench/**'
      - 'backend/vendor/tau_bench/**'
      - 'backend/agentloom/benchmarks/**'
      - '.github/workflows/agentloom-bench.yml'
  workflow_dispatch:
    inputs:
      run_live_benchmark:
        description: 'Also run 5 retail tasks against BACKEND_URL'
        required: false
        default: 'false'
  schedule:
    - cron: '0 6 * * 0'  # Sun 06:00 UTC weekly

concurrency:
  group: agentloom-bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-smoke:
    name: Unit + smoke (no live LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install agentloom-bench (with upstream tau_bench)
        working-directory: agentloom_bench
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run unit tests
        working-directory: agentloom_bench
        run: |
          pytest tests/unit -v

      - name: Run smoke tests (validates upstream tau_bench install)
        working-directory: agentloom_bench
        run: |
          pytest tests/smoke -v

  live-benchmark:
    # Manual / cron only when BACKEND_URL secret is set. PR runs skip
    # this job entirely.
    name: Live retail 0-4 (gated on BACKEND_URL)
    runs-on: ubuntu-latest
    needs: unit-and-smoke
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.run_live_benchmark == 'true')
      || github.event_name == 'schedule'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Skip if BACKEND_URL not configured
        id: gate
        run: |
          if [ -z "${{ secrets.BACKEND_URL }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "BACKEND_URL secret not set; skipping live run"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.12
        if: steps.gate.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install agentloom-bench
        if: steps.gate.outputs.skip == 'false'
        working-directory: agentloom_bench
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run retail 0-4 (sample baseline)
        if: steps.gate.outputs.skip == 'false'
        working-directory: agentloom_bench
        env:
          VOLCENGINE_API_KEY: ${{ secrets.VOLCENGINE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p runs/ci-${{ github.run_id }}
          agentloom-bench \
            --domain retail --task-ids 0-4 \
            --backend-url '${{ secrets.BACKEND_URL }}' \
            --agent-provider '${{ secrets.AGENT_PROVIDER_ID }}' \
            --agent-model 'ark-code-latest' \
            --max-turns 30 \
            --out runs/ci-${{ github.run_id }}

      - name: Upload artifact
        if: steps.gate.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: tau-bench-retail-0to4-${{ github.run_id }}
          path: agentloom_bench/runs/ci-${{ github.run_id }}/
          retention-days: 30
