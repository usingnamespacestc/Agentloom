services:
  postgres:
    image: postgres:16-alpine
    container_name: agentloom-postgres
    environment:
      POSTGRES_USER: agentloom
      POSTGRES_PASSWORD: agentloom
      POSTGRES_DB: agentloom
    ports:
      - "5432:5432"
    volumes:
      - agentloom_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentloom"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agentloom-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentloom-backend
    environment:
      AGENTLOOM_DATABASE_URL: postgresql+asyncpg://agentloom:agentloom@postgres:5432/agentloom
      AGENTLOOM_REDIS_URL: redis://redis:6379/0
      AGENTLOOM_ENVIRONMENT: dev
      VOLCENGINE_API_KEY: ${VOLCENGINE_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - agentloom_data:/app/data

volumes:
  agentloom_pgdata:
  agentloom_data:
