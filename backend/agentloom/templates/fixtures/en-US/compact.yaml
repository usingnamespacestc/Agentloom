builtin_id: compact
name: "Compact"
description: >
  Context compaction worker. Summarizes a message sequence into compact
  prose so descendants can keep the substance of past exchanges without
  carrying every raw turn forward. Invoked by the engine (WorkFlow
  Tier 1, pre-llm_call) or explicitly by the user (ChatFlow Tier 2).
  The *preserved recent turns* are carved off **before** this plan
  runs — the engine packs them alongside the summary into a
  ``CompactSnapshot``. This plan only produces the summary prose.
params_schema:
  messages_to_compact:
    type: string
    required: true
    description: >
      Serialized message tail that needs summarizing (the early chunk —
      recent turns are preserved verbatim and do NOT appear here).
      Each message is rendered as ``[node:<id> | role] content``, where
      ``<id>`` is the ChatNode / WorkNode id the message came from so
      the summary can cite it.
  target_tokens:
    type: int
    required: true
    description: >
      Rough token budget the summary should fit into. The model should
      aim under this, not push against it.
  must_keep:
    type: string
    required: false
    description: >
      Freeform text the user wants preserved verbatim (names, ids,
      decisions, constraints). Empty when the user did not specify.
  must_drop:
    type: string
    required: false
    description: >
      Freeform text the user considers safe to drop. Empty otherwise.
  compact_instruction:
    type: string
    required: false
    description: >
      Freeform user guidance for how to compact — focus areas, tone,
      style. Empty when the engine triggered the compact silently.
plan:
  description:
    text: "Compact a message sequence into a summary."
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "compact_worker"
      parent_ids: []
      step_kind: draft
      description:
        text: "Produce a compact summary of the supplied messages."
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            You are a context compaction worker. Your job: rewrite a
            long stretch of prior conversation into a **very terse**
            summary so downstream LLM calls can read the summary alone
            and still make progress; when they need the raw content
            they can call the ``get_node_context`` skill with the cited
            node id to pull it back.

            Output format (obey strictly):

            1. First line is a fixed pointer telling the reader how to
               fetch full content on demand, e.g.:
                 For full content, call get_node_context(node_id=<id>)
                 to inspect the cited node.

            2. Every following paragraph corresponds to **one node** —
               fold all messages under the same node id (typically a
               user turn + assistant reply, sometimes with tool calls)
               into a single paragraph that narrates what the user did
               AND how the assistant responded as one complete
               exchange. Do NOT split a single node into two paragraphs
               (e.g. one for the user message, one for the reply).
               Keep each paragraph **as short as possible** — one or
               two sentences, no filler, no pleasantries, no
               restatements, no process narration that won't affect
               later decisions. End each paragraph with the node id
               **once**, e.g. ``(nodes: n_abc)``. Only when a paragraph
               genuinely spans multiple nodes should you list several,
               e.g. ``(nodes: n_abc, n_def)``; otherwise the same node
               id must not appear twice in the summary.

            Hard rules:
              - Preserve proper nouns, ids, file paths, numbers, dates,
                explicit decisions, and any tool-call results / error
                messages later turns may need — but keep only the
                *conclusions* and *key facts*; drop process detail and
                let the reader chase the node id when needed.
              - Write in neutral third person: "The user asked X. The
                assistant answered Y." — not first-person.
              - If the user supplied ``must_keep`` content, weave it
                in verbatim. If ``must_drop`` content appears, omit it.
              - Respect the target token budget: aim UNDER
                ``target_tokens``; never exceed it. Terser is better —
                details can live behind the node id.
              - Every cited node id must actually appear in a
                ``[node:<id>]`` prefix in the input. Do not invent ids.
                Use ``(nodes: ?)`` when no precise source fits.
              - Output the summary body only (pointer line + paragraphs)
                — no extra preamble, no postscript, no JSON, no markdown
                code fences.
        - role: user
          content: |
            Target tokens: {{ target_tokens }}

            Must-keep (verbatim):
            {{ must_keep }}

            Must-drop (omit):
            {{ must_drop }}

            User instruction:
            {{ compact_instruction }}

            Messages to compact (each line starts with ``[node:<id> | role]``):
            ---
            {{ messages_to_compact }}
            ---

            Write the summary now.
  root_ids: ["compact_worker"]
