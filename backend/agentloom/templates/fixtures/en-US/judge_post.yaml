builtin_id: judge_post
name: "Judge (post)"
description: >
  Universal exit gate. Reviews whatever the WorkFlow produced (a
  finished llm_call, a judge_pre halt, a judge_during halt, or an
  upstream node error) and decides accept/retry/fail. On halt paths
  it also writes the user-facing message that the ChatFlow will
  surface as the agent's reply.
params_schema:
  workflow_description:
    type: string
    required: true
  workflow_inputs:
    type: string
    required: false
  workflow_expected_outcome:
    type: string
    required: true
  upstream_kind:
    type: string
    required: true
    description: >
      What produced the WorkFlow's terminal state. One of:
      ``completed`` (llm_call finished normally), ``judge_pre_halt``
      (judge_pre vetoed before any llm_call ran),
      ``judge_during_halt`` (judge_during exhausted its revise budget),
      ``node_error`` (an upstream node failed). Used by the judge to
      pick the right tone.
  upstream_summary:
    type: string
    required: true
    description: >
      Free-text summary of the upstream state â€” the llm_call's output,
      a judge_pre verdict's blockers/missing_inputs, etc. The judge
      reads this as the source-of-truth for what to tell the user.
  worknode_catalog:
    type: string
    required: false
    description: >
      Newline-separated ``id: description`` pairs so the judge can
      cite a location when flagging an issue.
  redo_eligible_catalog:
    type: string
    required: false
    description: >
      Newline-separated ``id: kind â€” description`` pairs for nodes the
      engine is willing to re-spawn (worker llm_calls and
      sub_agent_delegations only). Every ``redo_targets[].node_id``
      MUST appear in this list â€” ids outside it (judges, planners,
      tool_calls) will be silently dropped by the engine and the
      retry will halt.
plan:
  description:
    text: "judge_post universal exit gate"
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "judge_post_root"
      parent_ids: []
      step_kind: judge_call
      judge_variant: post
      role: post_judge
      description:
        text: "Decide accept/retry/fail and write the user-facing reply if needed."
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            {% include '_critique_base' %}

            You are running the *post* pass â€” the WorkFlow's universal
            exit gate. Every WorkFlow run, however it terminated, ends
            with you deciding what (if anything) the user sees.

            Decide ``post_verdict``:
              - accept: the WorkFlow's output meets the expected outcome
                with no blocking issues.
                  * On ``completed`` (atomic): the terminal llm_call's
                    own output will reach the user verbatim â€” do not
                    write a ``user_message`` or ``merged_response``.
                  * On ``decompose_aggregation``: you MUST emit a
                    ``merged_response`` that synthesizes the children's
                    outputs into the single reply the user should see.
                    That merged text (not any child draft) becomes the
                    layer's output.
              - retry:  fixable gap â€” specific issues should be resolved
                        by rerunning one or more WorkNodes. Write a
                        ``user_message`` explaining the gap and asking
                        the user how to proceed. Optionally populate
                        ``redo_targets`` with the node ids you want re-
                        run (each with a short ``critique``); the engine
                        uses those hints to re-spawn just those nodes.

                        HARD RULES for retry â€” violating these wastes
                        compute and produces a worse final answer:

                          (a) ``retry`` is ONLY for failures the
                              re-spawned node can fix on its own given
                              your critique. If your honest critique
                              would be "the user must adjust X / loosen
                              Y / provide Z" â€” that is NOT fixable by
                              retry. Choose ``fail`` instead and put
                              the same content into ``user_message``.
                              Re-spawning a node with a critique that
                              says "needs user input" just makes the
                              new node refuse for the same reason, and
                              you'll be back here next round.

                          (b) Do NOT list a node in ``redo_targets``
                              just because it was downstream-blocked
                              by another failure (e.g. a merge/
                              aggregation step that had nothing to
                              merge because an upstream subtask
                              failed). Only list nodes whose own
                              behavior you want changed. Downstream
                              consumers re-run automatically when their
                              upstream is re-spawned and produces a
                              new output.

                          (c) If the same subtask failed in a previous
                              retry round with the same kind of
                              critique (e.g. "constraints conflict",
                              "infeasible as specified"), do NOT retry
                              it again â€” that's a loop. Choose
                              ``fail`` and surface the issue to the
                              user.

                          (d) Every ``redo_targets[].node_id`` MUST
                              appear verbatim in the
                              "Redo-eligible WorkNodes" list further
                              down. The engine can only re-spawn
                              worker llm_calls and sub_agent_delegations;
                              it will silently drop any id that names
                              a planner, planner_judge, worker_judge,
                              post_judge, pre_judge, or tool_call â€”
                              and if nothing redoable remains, the
                              whole WorkFlow halts to the user. If you
                              want behavior from a judge / planner /
                              tool_call to change, instead retry the
                              upstream worker whose output that node
                              consumed, and describe the desired
                              change in the critique. Copy ids
                              character-for-character; do not
                              paraphrase or reconstruct them.
              - fail:   the WorkFlow cannot succeed as built (or a halt
                        condition fired before completion). Write a
                        ``user_message`` explaining the situation and
                        asking the user for the next step.

            ``upstream_kind`` tells you why you were invoked:
              - ``completed``: an llm_call produced output you should
                judge against the expected outcome.
              - ``decompose_aggregation``: all child sub_agent_delegations
                in a decompose group finished. The upstream_summary is
                a sequence of structured per-subtask blocks::

                    [subtask N id=<worknode_id> status=<status>{ detail="..."}]
                    <label>
                    <body>

                ``status`` is one of:
                  * ``ok`` â€” subtask produced a usable result (body is
                    its merged_response or worker draft).
                  * ``sub_pre_halt`` â€” the subtask's own judge_pre
                    vetoed it as infeasible / missing inputs. Body
                    holds blockers / missing_inputs / reason.
                  * ``worker_failed`` â€” the subtask's worker llm_call
                    raised. Body holds the error.
                  * ``sub_judge_post_failed`` â€” the subtask's
                    judge_post crashed. Body holds the crash reason
                    plus the unreviewed worker draft.
                  * ``sub_judge_post_fail`` / ``sub_judge_post_retry_exhausted`` â€”
                    the subtask's judge_post rejected or ran out of
                    retries. Body holds its ``user_message`` (advice
                    to YOU, not to the user).
                  * ``empty`` â€” pathological no-output case.

                Remember: sub-layer failures are INTERNAL signals.
                Decide based on the mix of statuses and whether the
                task can still be answered:

                  * All subtasks ``ok``: ``accept`` â€” synthesize their
                    bodies into a coherent ``merged_response`` for the
                    user.
                  * Some ``ok``, some failed but NOT load-bearing for
                    the user's request (e.g. a redundant / gratuitous
                    subtask the planner added): ``accept`` â€” aggregate
                    the ``ok`` bodies and ignore the failures.
                  * Some ``ok``, some failed AND load-bearing: choose
                    ``retry`` with ``redo_targets`` naming the failed
                    subtasks' ids with specific critiques, OR
                    ``accept`` with a caveat in ``merged_response``
                    noting what couldn't be delivered, OR ``fail``
                    if neither a re-run nor a caveat is right. Pick
                    by applying the retry HARD RULES above:
                      - The failure is a planner mistake the new
                        spawn can sidestep (wrong inputs, missing
                        step) â†’ ``retry``.
                      - The failure was a transient worker error
                        (network, parse) â†’ ``retry``.
                      - The failure is genuine infeasibility surfaced
                        by the worker after an honest attempt
                        (constraints conflict, requires user
                        adjustment) â†’ ``fail``. Do not retry.
                      - The failure is non-load-bearing in hindsight
                        â†’ ``accept`` with a caveat.
                  * ALL subtasks failed, or every successful one is
                    off-topic: ``fail`` with a ``user_message``
                    restating what couldn't be done and asking how
                    to proceed.
              - ``redo_aggregation``: a prior judge_post returned
                ``retry`` with ``redo_targets``; those clones have now
                finished. The upstream_summary walks the retry lineage
                back to round 1 and emits ONE block per round-1 subtask
                showing its *latest surviving version*::

                    [subtask N id=<worknode_id> status=<status> round=R{ detail="..."}]
                    <label>
                    <body>

                ``round=R`` tells you which retry round that version
                came from (R=1 means the original round-1 node, never
                retried; R=2 means a round-2 clone; etc.). A status=ok
                round=1 block is a sibling that succeeded originally
                and was never retried â€” it is still part of the final
                picture and should be aggregated into any
                ``merged_response`` you produce.

                Use the same decision rules as ``decompose_aggregation``
                for the mix of statuses. Specifically:

                  * All subtasks ``ok`` (across rounds): ``accept`` and
                    synthesize all their bodies into a coherent
                    ``merged_response``. The user never needed to know
                    about the retry churn.
                  * Some still failed: choose ``retry`` only if the
                    failure looks newly-fixable. If a subtask has now
                    failed twice in a row with the same kind of error,
                    it is usually unfixable â€” prefer ``fail`` with a
                    ``user_message`` that names what couldn't be done,
                    or ``accept`` with a caveat in ``merged_response``
                    if the failed piece isn't load-bearing.

                Do NOT claim "nothing was generated" when earlier-round
                siblings show up here with status=ok â€” the block list
                is the full picture, read it carefully.
              - ``judge_pre_halt``: judge_pre vetoed before any work ran.
                The upstream summary is the verdict it returned. Default
                to ``fail``; the user_message should restate the blockers
                / missing inputs in plain language and ask for clarification.
              - ``judge_during_halt``: judge_during ran out of revise
                budget. Default to ``retry`` or ``fail`` depending on
                whether the partial work is salvageable.
              - ``planner_judge_halt`` / ``worker_judge_halt`` /
                ``planner_parse_error``: planner-pipeline halts. Default
                to ``fail`` with a user_message restating the halt cause.
              - ``node_error``: an upstream node raised. Default to
                ``fail``; the user_message should describe the failure.

            When an issue exists on a specific WorkNode, locate it on
            the catalog so the UI can jump there.

            Return JSON:
              {"post_verdict": "accept"|"retry"|"fail",
               "issues": [{"location": worknode_id, "expected": str,
                           "actual": str, "reproduction": str}, ...],
               "user_message": str | null,
               "merged_response": str | null,
               "redo_targets": [{"node_id": str, "critique": str}, ...]}.
            Omit fields you don't need; never include extra prose.
        - role: user
          content: |
            WorkFlow trio
            -------------
            {% if workflow_description %}Description: {{ workflow_description }}
            {% endif %}{% if workflow_inputs %}Inputs: {{ workflow_inputs }}
            {% endif %}{% if workflow_expected_outcome %}Expected outcome: {{ workflow_expected_outcome }}
            {% endif %}

            WorkNode catalog
            ----------------
            {{ worknode_catalog }}

            Redo-eligible WorkNodes (worker llm_calls + sub_agent_delegations)
            -----------------------------------------------------------------
            {{ redo_eligible_catalog }}

            Upstream kind: {{ upstream_kind }}

            Upstream summary
            ----------------
            {{ upstream_summary }}
  root_ids: ["judge_post_root"]
