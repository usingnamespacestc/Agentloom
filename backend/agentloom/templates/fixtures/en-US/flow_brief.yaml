builtin_id: flow_brief
name: "Flow brief"
description: >
  MemoryBoard flow-brief worker. Summarizes an entire WorkFlow — via
  its pre-check upstream inputs, the concatenated node-briefs of its
  interior nodes, and the post-check output — into a single short
  prose description. The result becomes the enclosing WorkFlow's
  ``MemoryBoardItem.description`` (for a delegate, this text is what
  the parent layer sees when it consumes the delegate's board item).
  Fires once per WorkFlow run, synchronously at terminal state.
params_schema:
  workflow_description:
    type: string
    required: false
    description: >
      The WorkFlow's trio.description text (what the WorkFlow was
      set up to do).
  workflow_expected_outcome:
    type: string
    required: false
    description: >
      The WorkFlow's trio.expected_outcome text (what "done" means
      for this WorkFlow).
  upstream_inputs:
    type: string
    required: false
    description: >
      Pre-check upstream context that fed into the WorkFlow — the
      user turn / prior ChatNode / judge_pre verdict, whichever kicked
      off this run. Empty when the WorkFlow had no extra upstream.
  node_briefs:
    type: string
    required: false
    description: >
      Concatenated node-brief descriptions from every brief-eligible
      WorkNode in this WorkFlow, one line per brief formatted as
      ``[<kind>] <description>``. Node ids are NOT passed into the
      prompt — the system tracks them separately in MemoryBoard
      metadata. Empty when the WorkFlow halted before any brief ran.
  terminal_output:
    type: string
    required: true
    description: >
      The WorkFlow's terminal output — the final llm_call / judge_post
      merged_response, or the ``pending_user_prompt`` text on a halt.
      This is what the parent layer will see if it reads only the end
      of the run.
  terminal_state:
    type: string
    required: true
    description: >
      One of ``succeeded``, ``halted``, ``cancelled``. Gives the
      summarizer the framing — a halted flow's brief should note
      "couldn't finish because…" rather than describe it as done.
plan:
  description:
    text: "Produce a one-to-two-sentence flow-brief."
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "flow_brief_root"
      parent_ids: []
      step_kind: draft
      description:
        text: "Distill the WorkFlow's run into a short prose description."
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            You are a MemoryBoard summarizer operating at the
            WorkFlow level. Your job: rewrite one WorkFlow's entire
            run — what it was asked to do, what its interior nodes
            produced, and what it finished with — into a single short
            prose description that a parent layer can scan instead of
            walking the inner DAG.

            Hard rules:
              - Cover exactly three things: what the WorkFlow was
                set up to do (intent), what it actually produced
                (takeaway), and — if ``terminal_state`` is ``halted``
                or ``cancelled`` — why it couldn't finish. One or
                two sentences total.
              - No bullet points, no headings, no markdown, no
                JSON, no code fences. Plain prose.
              - Preserve concrete anchors: tool names, file paths,
                numbers, decisions, error names. Drop process
                narration. Do NOT write node ids or the WorkFlow id
                in the prose — the system attaches them as MemoryBoard
                metadata when it persists the brief.
              - Do not speculate about downstream use.
              - Never invent content. If ``node_briefs`` is empty
                and ``terminal_output`` is a halt message, describe
                exactly that — do not pretend interior work
                happened.
              - Write in neutral third person.
        - role: user
          content: |
            Terminal state: {{ terminal_state }}

            Description: {{ workflow_description }}
            Expected outcome: {{ workflow_expected_outcome }}

            Upstream inputs (pre-check context):
            ---
            {{ upstream_inputs }}
            ---

            Node briefs (one per interior node):
            ---
            {{ node_briefs }}
            ---

            Terminal output:
            ---
            {{ terminal_output }}
            ---

            Write the one-to-two-sentence flow-brief now. Output the
            brief text only — no preamble, no postscript.
  root_ids: ["flow_brief_root"]
