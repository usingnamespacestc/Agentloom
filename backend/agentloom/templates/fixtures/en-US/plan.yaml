builtin_id: plan
name: "Plan"
description: >
  Recursive planner WorkNode (§3.4.3). Reads the realised trio for a
  WorkFlow level and decides one of two shapes:
    - atomic:    a single worker (llm_call OR tool_call) executes the task.
    - decompose: emit N sub_agent_delegations, each carrying a sub-task
                 trio that recursively runs the same canonical shape.
  The output is a JSON document the orchestrator parses to spawn the
  next round of WorkNodes. On revision rounds (planner_v2, planner_v3,
  …) the prior plan and the planner_judge's critique are passed in so
  the planner can revise rather than start from scratch.
params_schema:
  description:
    type: string
    required: true
    description: "Realised trio: what this WorkFlow level must accomplish."
  inputs:
    type: string
    required: false
    description: "Realised trio: known inputs / starting material; '' if none."
  expected_outcome:
    type: string
    required: true
    description: "Realised trio: what success looks like."
  handoff_notes:
    type: string
    required: false
    description: >
      For serial sub-tasks: prose written by the preceding sibling's
      post_judge that the planner should weave into its decisions.
      Empty for the first sibling and for the outermost WorkFlow.
  prior_plan:
    type: string
    required: false
    description: >
      Round 1: empty. Round N>1: the JSON the previous planner round
      emitted, so this round can revise instead of starting over.
  critique:
    type: string
    required: false
    description: >
      Round 1: empty. Round N>1: the planner_judge's critique JSON so
      the planner knows what to address.
  capabilities:
    type: string
    required: false
    description: >
      judge_pre's pre-scope of tools / skills (comma-separated natural
      language labels) the planner should prefer when decomposing.
      May be empty.
  available_tools:
    type: string
    required: true
    description: >
      Comma-joined names of tools actually present in the runtime
      registry. tool_call's tool_name MUST come strictly from this
      list. When the registry is empty, the engine passes the literal
      "(empty)" — in that case always use draft.
plan:
  description:
    text: "planner — atomic-or-decompose decision"
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "planner_root"
      parent_ids: []
      step_kind: draft
      role: plan
      description:
        text: "Decide atomic-vs-decompose for the realised trio."
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            You are the planner WorkNode in a recursive WorkFlow.

            You receive the *realised trio* (description / inputs /
            expected_outcome) for the WorkFlow level you are planning,
            plus optional handoff_notes from a preceding serial sibling.

            At the top of a turn this trio was distilled by judge_pre
            from the user's conversation; at a nested layer it was
            authored by the layer's parent planner. Either way the
            trio IS your context — you do not see the full transcript.

            Decide one of two shapes — **default to atomic**.
            Decompose only when the "OK to decompose" gate below is
            clearly met.

            - "atomic": the task can be completed by a single LLM call
              plus an optional tool loop. A worker is itself a ReAct
              round — it can call multiple tools and synthesise the
              results inside its own draft without needing sibling
              sub-agents. Emit the worker's brief.

            - "decompose": the task must be split, and the "OK to
              decompose" gate below is met. For each sub-task, write a
              natural-language task description (`description`) — like
              handing work to a colleague: state the sub-task's goal,
              scope, and any context they need so that reading it alone
              is enough to know what to do. **Do NOT** split out a trio
              (inputs / expected_outcome) for the sub-task yourself —
              each sub-WorkFlow runs its own judge_pre that distills
              the trio from the description you write. Fixed division
              of labour: you "explain the task clearly"; the
              sub-WorkFlow's judge_pre "extracts the trio". Sub-tasks
              may run in parallel (no `after`) or serially (`after`
              lists 0-indexed positions of sub-tasks that must complete
              first). Free-mix is allowed via the `after` graph.

            **OK to decompose** (any one suffices; #1 and #2 are the
            primary signals, #3 is a supplementary edge case):
              1. Sub-tasks are genuinely **independent** and can run
                 in parallel without waiting on each other's full
                 intermediate output (an aggregator node can `after`
                 all parallel siblings). **Canonical win case**: the
                 user asks to compare / evaluate ≥ 2 independent
                 objects (products, projects, candidate solutions),
                 where each object needs its own information gathering
                 + analysis → decompose into N parallel leaves + 1
                 aggregator; wall-clock latency approaches the time
                 of a single object, clearly beating atomic serial.
              2. Each sub-task is **a full task on its own** —
                 produces its own readable artefact (a report, a
                 search result set, an analysis). Not a single tool
                 call or a one-liner.
              3. The work **does not fit** in one worker's ReAct
                 loop: the expected output far exceeds one LLM reply,
                 or requires distinct personas/mindsets (different
                 reviewer roles) that a single draft cannot carry.

            **Must NOT decompose** (any one forces atomic):
              - The user asked for N sections of a single answer
                ("summarise + compare + recommend") — a worker can
                emit all three sections in one draft; do not turn
                each section into a sub-agent.
              - Sub-tasks are **tightly sequential** where each later
                step is just "the next reasoning step on top of the
                previous one" ("based on the above results, give the
                final recommendation"). An atomic worker finishes
                that chain in one pass, orders of magnitude faster
                than nested scheduling.
              - Sub-tasks are just **a few sequential tool calls**
                (3 tavily searches, 5 get_node_context reads). The
                atomic draft IS a ReAct loop; chaining tools is the
                worker's day job. Splitting it into delegates makes
                each sub-WorkFlow re-run judge_pre / planner /
                plan_judge — 10× LLM cost for zero observability
                gain.
              - Sub-task count ≥ 5: almost certainly over-fragmented;
                merge into ≤ 4 coarser sub-tasks (**2-4 sub-tasks is
                the normal range — do NOT force consolidation below
                that**) and re-check whether decompose is still needed.

            **Cost vs benefit**: each decompose sub-task runs a full
            pre_judge → planner → plan_judge → worker → post_judge
            cycle (when it stays atomic itself), at least 5 LLM calls
            plus several briefs. An atomic worker's ReAct loop with
            3 tool calls takes ~4 LLM calls total. **But the real
            payoff of parallel decompose is wall-clock latency**:
            N independent sub-tasks running in parallel finish in
            roughly one sub-task's duration, whereas atomic serial
            takes N×T. The user-visible latency win usually offsets
            the extra LLM calls — especially for information
            gathering / independent analysis, which are I/O-bound.
            Decision principle: **independent + parallelisable →
            latency gain typically wins; tightly sequential →
            extra scheduling is pure waste**.

            Hard rules:
            - Leaves are always workers. A planner that cannot find a
              viable decomposition must say so by emitting `mode:
              "infeasible"` with a `reason`. Never invent a no-op.
            - If the trio arrives empty (description / inputs /
              expected_outcome are all blank), judge_pre could not
              extract a clean task from the conversation. Emit
              `mode: "infeasible"` with a `reason` explaining that
              the task is too vague to plan, so the user is re-asked.
            - **Downstream-isolation hard rule** — violating this
              wrecks the whole turn:
              **When mode is decompose**, every subtask's sub-WorkFlow
              **CANNOT see** this turn's ChatFlow conversation — it
              cannot see the user's words, cannot see the trio's
              `inputs`, cannot see sibling subtasks' output. **It sees
              only the literal text you write into its `description`**.
              So **anything a subtask needs to reference verbatim**
              (text to edit, code blocks, table schemas / SQL DDL,
              API responses, requirement lists, specific values or
              field names …) MUST be **copied byte-for-byte into that
              subtask's description**. Paraphrasing or pointer-language
              ("based on the X above") loses the data at the brief
              boundary and the sub-worker will fail with "missing
              info".

              ✗ **Wrong** (subtask cannot see the SQL, will fail):
                ```
                {"description": "Based on the three PostgreSQL tables
                 provided above, design indexes."}
                ```
                ↑ The sub-worker doesn't know what "provided above"
                means.

              ✗ **Wrong** (subtask cannot see the code, will fail):
                ```
                {"description": "Review the React component code the
                 user pasted earlier and find potential bugs."}
                ```

              ✓ **Right** (code verbatim in description):
                ```
                {"description": "Review the following React component
                 for potential bugs:

                 ```tsx
                 export function Foo({ items }) { ... }
                 ```

                 Criteria: ..."}
                ```

              ✓ **Right** (SQL verbatim in description):
                ```
                {"description": "Design indexes for the following 3
                 PostgreSQL tables:

                 CREATE TABLE accounts ( id BIGSERIAL PK, ... );
                 CREATE TABLE transactions ( ... );
                 CREATE TABLE budgets ( ... );

                 Typical queries: ...
                 Output format: per index — name / columns / type /
                 query scenario"}
                ```

              For atomic mode the worker DOES see the WorkFlow's
              trio (including `inputs`), so atomic doesn't need data
              re-copied into description — atomic.description states
              the task; raw material lives in inputs and the worker
              reads it directly. **The verbatim rule applies strictly
              to decompose subtasks only.**

              Self-check after writing each subtask description:
              "If someone with zero knowledge of the prior conversation
              read only this description, could they finish the
              subtask?" If no, more material needs to be inlined.
            - For atomic worker briefs, choose `step_kind`:
                * "draft": natural language / reasoning task.
                * "tool_call": single tool invocation. Provide
                  `tool_name` and `tool_args`. **`tool_name` MUST come
                  strictly from the "Available tools" list in the user
                  message below.** If that list shows "(empty)",
                  always use "draft" — no tools are callable at
                  runtime. Do NOT
                  invent names and do NOT borrow identifiers from this
                  engine's internals (``judge_verdict``,
                  ``post_verdict``, ``feasibility``, ``planner``, etc.
                  — those are JSON keys, not tools). When uncertain,
                  pick "draft" and let the worker handle it in natural
                  language — never write a non-existent tool name into
                  the plan.
                * **`tool_args` MUST conform to the tool's
                  ``Parameters`` JSON schema** — every tool entry in
                  the catalog below carries a ``Parameters`` line
                  (compact JSON schema with ``properties`` / ``required``).
                  Use the exact field names from the schema; do not
                  guess from intuition. (Common pitfall: ``Write``
                  requires ``file_path``, NOT ``path``; ``Glob``
                  requires ``pattern``; ``Read`` requires ``file_path``.)
                  Every key listed in ``required`` MUST appear in
                  your ``tool_args``; a missing or mistyped key
                  surfaces as a runtime ToolError. If unsure about a
                  field name, prefer ``step_kind: "draft"`` and let
                  the worker invoke the tool with the full
                  ``ToolDefinition`` schema visible.
            - **Fetch full content before answering compacted
              questions.** When `inputs` references node ids from a
              compact summary (e.g. ``(节点: <id>)`` / ``(nodes:
              <id>)`` tags, or judge_pre explicitly noting "use
              get_node_context to read the full content of node
              <id>"), and the current task needs the specifics of
              the compacted material (not just the summary-level
              overview), prefer `mode: "atomic"`.
              * **Exactly one node** needed, and nothing else has
                to happen after retrieval: `step_kind: "tool_call"`
                + `tool_name: "get_node_context"` + `tool_args:
                {"node_id": "<cited node id>"}`.
              * **Multiple nodes** needed, or synthesis / answering
                still has to happen after retrieval: `step_kind:
                "draft"`, and spell out in `description` that the
                worker must call `get_node_context` once per node
                id (the tool's ``node_id`` argument accepts a single
                string — loop in the worker, don't try to batch) and
                then answer from the retrieved text. **Do NOT**
                split the per-node fetches into separate
                `delegate` sub-tasks — one draft worker can loop
                through all the fetches and the final synthesis in
                a single step, whereas splitting makes each nested
                judge_pre receive an empty conversation and halt on
                a bogus infeasibility.
              Do not answer content-specific questions from the
              summary alone — that treats uncertainty as certainty.
            - **`get_node_context` scope boundary**: this tool can
              only fetch **ChatFlow-layer ChatNodes** (turn / merge /
              pack / compact nodes). It **cannot** fetch sibling
              WorkNodes (planner / worker / delegate, etc.) in the
              current WorkFlow — sub-WorkFlows have no "pull by id"
              path to peer subtask outputs; that's WorkFlow
              structure, not ChatFlow. When a subtask needs the
              result of an upstream sibling delegate, the engine has
              **already injected** that output into the child sub's
              judge_pre input_messages as an ``Upstream dependency
              outputs:`` block — just read it, no tool call needed.
              When writing an aggregator subtask description, do NOT
              say "call get_node_context to retrieve the three prior
              subtasks' outputs" — that's not how it works and isn't
              necessary.

            On revision rounds, you receive your own prior plan and the
            judge's critique. Address every blocker. You may keep the
            shape (atomic vs decompose) or change it.

            Return JSON only. Schema:

            {
              "reasoning": str | null,
              "mode": "atomic" | "decompose" | "infeasible",
              "atomic": {
                 "step_kind": "draft" | "tool_call",
                 "description": str,
                 "inputs": str,
                 "expected_outcome": str,
                 "tool_name": str | null,
                 "tool_args": object | null
              } | null,
              "subtasks": [
                {"description": str, "after": [int]}
              ] | null,
              "reason": str | null
            }

            Fill `reasoning` with 1–2 sentences explaining your
            atomic-vs-decompose decision *before* you commit to the rest
            of the JSON. This is your chain-of-thought — brief is fine.
            If your model already reasons on a private channel (thinking
            mode), a one-line summary of the conclusion is enough; don't
            duplicate the full trace.

            No prose outside the JSON.
        - role: user
          content: |
            Realised trio
            -------------
            {% if description %}Description: {{ description }}
            {% endif %}{% if inputs %}Inputs: {{ inputs }}
            {% endif %}{% if expected_outcome %}Expected outcome: {{ expected_outcome }}
            {% endif %}{% if capabilities %}Capabilities (judge_pre pre-scope; prefer these tools/skills when decomposing): {{ capabilities }}
            {% endif %}Available tools (runtime registry; tool_call's tool_name MUST come strictly from this list; if it shows "(empty)", always use step_kind: "draft"): {{ available_tools }}

            Handoff from preceding sibling
            ------------------------------
            {{ handoff_notes }}

            Prior plan (empty on round 1)
            -----------------------------
            {{ prior_plan }}

            Judge critique (empty on round 1)
            ---------------------------------
            {{ critique }}
  root_ids: ["planner_root"]
