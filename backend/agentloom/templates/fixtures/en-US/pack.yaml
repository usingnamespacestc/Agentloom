builtin_id: pack
name: "Pack"
description: >
  Mid-chain custom variant of Compact. Where compact implicitly covers
  the full root→leaf ChatNode history, pack summarizes an **arbitrary
  contiguous range of ChatNodes** chosen explicitly by the user. Output
  shape mirrors compact's — a short prose summary with per-ChatNode
  citations — so downstream context walks can substitute the pack
  summary in place of the packed range. The engine wraps the LLM
  output into a :class:`PackSnapshot`, captures the explicit
  ``packed_range`` itself, and (optionally) carves off a
  ``preserve_last_n`` verbatim tail before this plan runs.
params_schema:
  messages_to_pack:
    type: string
    required: true
    description: >
      Serialized range messages to summarize. Matches compact's
      ``messages_to_compact`` shape: each line is
      ``[node:<id> | role] content`` so the summary can cite source
      ChatNode ids for drill-down via ``get_node_context``.
  packed_node_ids:
    type: string
    required: true
    description: >
      Comma-separated list of ChatNode ids in the range, in
      topological order. The summary is expected to cite each id at
      least once when ``use_detailed_index`` is true.
  target_tokens:
    type: int
    required: true
    description: >
      Rough token budget for the summary. Aim under.
  use_detailed_index:
    type: bool
    required: false
    description: >
      When true (default), emit one paragraph per ChatNode id, each
      ending with ``(nodes: <id>)`` — downstream refs can cite
      individual members of the packed range. When false, collapse
      into a single monolithic paragraph with one closing
      ``(packed: ...)`` listing all ids.
  must_keep:
    type: string
    required: false
    description: >
      Freeform text to preserve verbatim.
  must_drop:
    type: string
    required: false
    description: >
      Freeform text to omit.
  pack_instruction:
    type: string
    required: false
    description: >
      Freeform user guidance — focus areas, tone, what matters most
      in this pack.
plan:
  description:
    text: "Pack a chosen mid-chain ChatNode range into a topic summary."
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "pack_worker"
      parent_ids: []
      step_kind: draft
      description:
        text: "Produce a pack summary for the given ChatNode range."
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            You are a conversation pack worker. Your job: summarize an
            **explicit mid-chain range of ChatNodes** (user turns plus
            their assistant replies, along with any inline tool calls)
            into terse prose so downstream turns see one compact block
            in place of the full range. Unlike compact (which covers
            the whole prior history), pack's range is exactly the set
            of ChatNode ids the user chose — never invent, never drop.

            Output format (obey strictly):

            1. First line is a fixed pointer telling the reader how
               to fetch full content on demand, e.g.:
                 For full content, call get_node_context(node_id=<id>)
                 to inspect any ChatNode in this pack.
               **Leave a blank line between this pointer and the body**.

            2. When ``use_detailed_index`` is true, every following
               paragraph corresponds to **one packed ChatNode id**.
               Fold that ChatNode's user turn + assistant reply (plus
               any tool calls between them) into one paragraph that
               narrates the exchange as one complete unit — do not
               split user and assistant into separate paragraphs. End
               each paragraph with the id **once**, e.g.
               ``(nodes: n_abc)``. Only when a paragraph genuinely
               spans multiple ids should you list several, e.g.
               ``(nodes: n_abc, n_def)``.

               **Separate paragraphs with a blank line** (two newlines)
               so markdown renders them as distinct blocks instead of
               running them together.

               When ``use_detailed_index`` is false, produce a SINGLE
               paragraph that summarizes the range holistically and
               ends with one closing ``(packed: <all-ids>)`` citation
               listing every packed ChatNode id.

            Hard rules:
              - Preserve proper nouns, ids, file paths, numbers, dates,
                explicit decisions, and any tool results / error
                messages later turns may need — but keep only the
                *conclusions* and *key facts*; drop process narration.
              - Write in neutral third person ("The user asked X. The
                assistant answered Y.").
              - If ``must_keep`` is given, weave it in verbatim. If
                ``must_drop`` appears in the range, omit it.
              - Respect ``target_tokens``: aim UNDER; never exceed.
              - Every cited id must be one of ``packed_node_ids``. Do
                not invent ids; do not cite ChatNodes outside the
                explicit range.
              - Output the summary body only (pointer line +
                paragraphs) — no extra preamble, no postscript, no
                JSON, no markdown code fences.
        - role: user
          content: |
            Target tokens: {{ target_tokens }}
            Use detailed index: {{ use_detailed_index }}
            Packed ChatNode ids (this is the exhaustive range — cite only these):
            {{ packed_node_ids }}

            Must-keep (verbatim):
            {{ must_keep }}

            Must-drop (omit):
            {{ must_drop }}

            User instruction:
            {{ pack_instruction }}

            Messages to pack (each line starts with ``[node:<id> | role]``):
            ---
            {{ messages_to_pack }}
            ---

            Write the pack summary now.
  root_ids: ["pack_worker"]
