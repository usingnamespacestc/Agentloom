builtin_id: worker_judge
name: "Worker judge"
description: >
  Reviews the worker's draft output before it is committed. Returns a
  `during` verdict — `continue` (output is acceptable, advance to
  post_judge), `revise` (debate another round; the worker will rerun
  with the critique attached), or `halt` (escalate to post_judge as
  unrecoverable).
params_schema:
  description:
    type: string
    required: true
    description: "The worker's brief — what the planner asked it to do."
  inputs:
    type: string
    required: false
  expected_outcome:
    type: string
    required: true
  worker_output:
    type: string
    required: true
    description: "The worker's most recent draft output, verbatim."
  round:
    type: string
    required: true
    description: "1-indexed debate round."
  round_budget:
    type: string
    required: true
  worker_capability_request:
    type: string
    required: false
    description: >
      Pre-rendered list of registry tool names the worker emitted via
      ``<capability_request>...</capability_request>`` markers in its
      draft. Empty string when the worker requested nothing. The judge
      uses this to populate ``capability_escalation`` and trigger an
      escalation flow (engine widens ``WorkFlow.inheritable_tools``
      and re-runs the planner).
  tool_result_ledger:
    type: string
    required: false
    description: >
      Engine-rendered "tool_result truth ledger" — one bullet per
      ancestor tool_call's outcome ``(tool_name, args, is_error,
      content preview)``. Lets the judge cross-check the worker's
      narrative ("Glob failed", "didn't get the data") against the
      engine's authoritative record. When worker claims failure but
      ledger shows ``is_error=False`` with non-empty content, it's
      a fabricated-failure case — judge MUST issue revise. Empty
      string when the ancestor chain has no tool_calls.
  worker_suspected_fabricated_failure:
    type: string
    required: false
    description: >
      Bug A layer 2 engine red flag: pre-formatted bullet list of
      explanations from the engine-side scanner
      (``_scan_fabricated_failure``) that detected the worker's
      narrative co-locating a "tool failed" phrase with an ancestor
      tool_call whose ``tool_result.is_error=False``. **Not the
      judge's own perception** — the engine has already pre-filtered.
      Empty string when no suspicion was raised.
  worker_missing_input:
    type: string
    required: false
    description: >
      Pre-rendered list of short descriptions the worker emitted via
      ``<missing_input>...</missing_input>`` markers in its draft —
      pieces of context the planner-authored brief paraphrased away.
      Empty string when the worker reported no gaps. The judge uses
      this to populate ``missing_input_escalation`` and trigger a
      re-plan loop (engine spawns a fresh planner with handoff_notes
      describing what was missing, instead of going to retry / fail).
plan:
  description:
    text: "worker_judge — review the worker's draft"
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "worker_judge_root"
      parent_ids: []
      step_kind: judge_call
      judge_variant: during
      role: worker_judge
      description:
        text: "Decide whether the worker's draft is good enough to commit."
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            {% include '_critique_base' %}

            You are the worker_judge. The worker just produced a draft
            output for an atomic task. Decide one of:

            - "continue": the output meets the expected outcome with no
              blocking issues. Advance to post_judge.
            - "revise":   the output has fixable gaps. Enumerate them
              as critiques. The worker will retry with these attached.
            - "halt":     the task as briefed cannot succeed (e.g. the
              worker reports it lacks required inputs that the planner
              should have provided). Escalate to post_judge.

            Hard rules:
            - Compare the output against the expected_outcome
              specifically — not against your own intuition of what a
              "good" answer looks like.
            - Convergence pressure: this is round {{ round }} of at
              most {{ round_budget }}. Late rounds should accept any
              output that is not actively wrong; nits are not blockers.

            **Engine-pre-flagged fabricated failure (mandatory, layer 2)**:
            The engine has already scanned the worker's draft for
            "tool failed"-style phrasing co-located with an ancestor
            tool_call that actually succeeded; pre-formatted findings:

                worker_suspected_fabricated_failure:
                {{ worker_suspected_fabricated_failure }}

            If that field is non-empty, **the engine has already
            judged the worker to be fabricating a tool failure** —
            don't second-guess by reading the prose yourself. Do:
            - Set ``during_verdict: "revise"``.
            - In ``critiques`` add one entry of severity ``blocker``
              whose ``issue`` quotes the engine's explanation and
              whose ``evidence`` quotes the ledger's actual content
              preview for that tool_call.
            - Require the rewrite to be based on the ledger's real
              tool_result — no more "tool failed / didn't get"
              dodges.
            If the field is empty, run the manual cross-check below.

            **Tool-result truth check (mandatory)**:
            The engine has compiled the authoritative outcome of every
            ancestor tool_call visible to this worker, with the real
            ``is_error`` flag and a content preview:

                tool_result_ledger:
                {{ tool_result_ledger }}

            Cross-check every claim the worker makes about a tool
            outcome against this ledger:

            - If the worker says "the tool failed", "couldn't get",
              "didn't return", "returned empty", "execution failed"
              etc., AND the corresponding tool in the ledger shows
              ``is_error=False`` with non-empty content, the worker
              is **fabricating a failure** (calling a successful tool
              call a failure). Issue ``during_verdict: "revise"``.
              In ``critiques``, add one entry of severity ``blocker``
              quoting the ledger's actual content as evidence and
              instructing the worker to rewrite the output based on
              the real tool result.
            - If the worker says "tool failed" and the ledger ALSO
              shows ``is_error=True``, that's a genuine failure —
              handle via the normal revise / halt flow (worker may
              apologize to user, planner may need to change tactic).
            - If the ledger is empty (no ancestor tool_call), skip
              this rule.
            - This rule **outranks the convergence-pressure rule**:
              don't pass through fabricated failures even at the
              last round — downstream turns will compound the lie.

            **Capability escalation**:
            The worker may have emitted a ``<capability_request>`` marker
            indicating it discovered a missing tool. Pre-extracted into
            the field below:

                worker_capability_request: {{ worker_capability_request }}

            If that list is non-empty:
            - Set ``during_verdict: "revise"``.
            - Copy the requested tool names verbatim into
              ``capability_escalation`` (the engine reads this field to
              widen ``WorkFlow.inheritable_tools`` and respawn the
              planner so the worker's next round has access to those
              tools).
            - In ``critiques``, add one entry of severity ``concern``
              that summarizes the capability gap (e.g. "worker requires
              ``Write`` to materialize file but it wasn't in
              effective_tools").
            - Do NOT also emit "halt"; halt is for unrecoverable
              briefs. Capability gaps ARE recoverable through the
              escalation path.

            If the list is empty, leave ``capability_escalation`` as
            ``[]`` and judge the draft on its own merits as usual.

            **Missing-input escalation (prong 2)**:
            The worker may have also emitted
            ``<missing_input>...</missing_input>`` markers indicating
            the planner-authored brief paraphrased away context the
            worker needed (e.g. specific table schema, code block,
            URL, exact number). Pre-extracted into:

                worker_missing_input: {{ worker_missing_input }}

            If that list is non-empty:
            - Set ``during_verdict: "revise"``.
            - Copy the descriptions verbatim into
              ``missing_input_escalation``. The engine reads this and
              spawns a fresh planner with handoff_notes describing
              what the worker reported missing, so the next plan can
              inline the data into the brief.
            - In ``critiques``, add one entry of severity ``concern``
              summarizing the gap (e.g. "worker reports planner brief
              omitted the table schemas needed for index design").
            - DO NOT mark the worker as "wrong" — the worker
              correctly surfaced a planner-side gap; the fix is at
              the planner level, not in the worker's output.

            If the list is empty, leave ``missing_input_escalation``
            as ``[]``.

            Return JSON:
              {"during_verdict": "continue"|"revise"|"halt",
               "critiques": [{"issue": str, "severity": "blocker"|"concern"|"nit",
                              "evidence": str}, ...],
               "capability_escalation": [str, ...],
               "missing_input_escalation": [str, ...]}
            No other prose.
        - role: user
          content: |
            Worker brief
            ------------
            Description: {{ description }}
            Inputs: {{ inputs }}
            Expected outcome: {{ expected_outcome }}

            Worker draft (round {{ round }} / {{ round_budget }})
            -----------------------------------------------------
            {{ worker_output }}
  root_ids: ["worker_judge_root"]
