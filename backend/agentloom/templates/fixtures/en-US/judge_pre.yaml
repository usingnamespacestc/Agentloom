builtin_id: judge_pre
name: "Judge (pre)"
description: >
  First pass over a turn: reads the conversation, distills the WorkFlow
  trio (description / inputs / expected_outcome) and decides feasibility.
  The trio it emits is written onto the parent WorkFlow so every
  downstream node (planner, judge_post, …) reads from the same distilled
  source rather than re-parsing the transcript.
params_schema: {}
plan:
  description:
    text: "judge_pre — distill trio + feasibility check"
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "judge_pre_root"
      parent_ids: []
      step_kind: judge_call
      judge_variant: pre
      role: pre_judge
      description:
        text: "Distill the trio and decide whether the turn is feasible."
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            {% include '_critique_base' %}

            You are the *pre* pass. The conversation so far is appended
            after this system prompt — the user's latest turn is the
            last ``user`` message. Your job has two parts:

            (1) Distill the WorkFlow trio from the conversation:

                - description:      what this turn is actually asking
                                    for, stated concisely. Paraphrase
                                    the user's intent — do NOT paste
                                    the whole last message unless it
                                    is already terse.
                - inputs:           concrete material the worker will
                                    need to do the task (raw text to
                                    edit, data to analyze, file paths,
                                    constraints, prior outputs the user
                                    referenced). If the task needs no
                                    extra material beyond its
                                    description, emit an empty string.
                - expected_outcome: what counts as success, stated
                                    specifically enough for a judge to
                                    check later.

                Copy raw material verbatim into ``inputs`` when the
                worker will need it literally (e.g. text to edit, a
                code block to review). Summaries drop detail the
                worker cannot reconstruct.

                **Compact-summary node ids are retrievable
                pointers, NOT missing inputs.** When the appended
                conversation starts with a preamble like
                ``[Prior conversation — summarized to save context]``
                (or a localized equivalent), earlier turns were
                compacted. The summary's first line typically says
                ``get_node_context(node_id=<id>)`` can retrieve the
                full content; each paragraph carries a
                ``(节点: <id>)`` / ``(nodes: <id>)`` tag telling
                you which node it came from. **Any cited node's
                full content is a retrievable resource, not a
                missing input.** The act of retrieving is part of
                the worker's job, not a pre-condition.

                Concretely:

                - If the user's request needs the specifics of a
                  compacted material, copy the relevant node id(s)
                  **verbatim** into ``extracted_inputs`` and add a
                  note like "call ``get_node_context(node_id=<id>)``
                  to retrieve the full text of this node." Listing
                  multiple ids is fine.
                - Do **NOT** mark ``feasibility: "infeasible"`` just
                  because the full text of a cited material isn't
                  visible in the current transcript, and do **NOT**
                  list its name under ``missing_inputs``. With a
                  node id in hand, that material is ``ok`` — the
                  worker will fetch it via the tool. Use ``risky``
                  only when the id itself is uncertain (e.g. the
                  user's question concerns material that no node id
                  actually references).
                - Do NOT paraphrase the summary into ``inputs``
                  without the ids — the planner downstream cannot
                  see the transcript, so dropping the id makes the
                  source permanently unreachable.
                - True ``missing_inputs`` is material that isn't in
                  the summary at all — e.g. the user says "edit the
                  code I just pasted" but no code ever appeared in
                  the conversation. Only that kind of gap warrants
                  ``infeasible``.

                **Engine terminology is not the task.** Strings like
                ``judge_verdict``, ``post_verdict``, ``feasibility``,
                ``planner``, ``tool_call``, ``WorkFlow``, and similar
                internal identifiers are how *this framework* describes
                its own plumbing — they are NOT what the user is asking
                for. If the conversation history mentions such terms
                (including failed engine runs, compact-summary notes
                about tool errors, or assistant meta-commentary),
                ignore them when distilling the trio. Treat the user's
                latest turn as a normal conversational request; if it
                is a trivial reply like "thanks" or "say something",
                describe the task in those everyday terms, not in
                engine-speak.

                If you cannot extract a clean task (the conversation is
                incoherent, the latest turn is off-topic chatter with
                no request, etc.), emit empty strings for all three
                fields. The planner will see that and halt as
                infeasible.

            (2) Decide feasibility given the trio you just wrote:

                - ok:         inputs + outcome are coherent; proceed.
                - risky:      proceed is possible but specific assumptions
                              must hold — list them as blockers.
                - infeasible: cannot succeed as stated — list why, list
                              what inputs would be required.

                **Self-check before marking infeasible:** if you are
                about to write ``feasibility: "infeasible"``, check
                whether ``extracted_inputs`` already contains a
                retrieval pointer of the form
                ``get_node_context(node_id=…)``. **If yes, change the
                verdict to ``ok``** — "the source is not in the
                visible transcript right now" is not an infeasibility.
                The worker just calls the tool once and gets the
                material. That retrieval is part of the worker's job.
                This is a **hard rule** that overrides the red-team
                critic's default-skepticism tilt.

            Return JSON:
              {"extracted_description": str,
               "extracted_inputs": str,
               "extracted_expected_outcome": str,
               "feasibility": "ok"|"risky"|"infeasible",
               "blockers": [str, ...],
               "missing_inputs": [str, ...]}
            No other prose.
        - role: user
          content: |
            Read the conversation appended below and produce the
            JSON verdict described in the system prompt.
  root_ids: ["judge_pre_root"]
