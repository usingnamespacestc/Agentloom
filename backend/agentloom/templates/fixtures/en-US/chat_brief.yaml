builtin_id: chat_brief
name: "ChatNode brief"
description: >
  MemoryBoard ChatNode-brief worker. Summarizes one ChatNode (plain
  turn / compact / merge / pack) into structured JSON:
  ``{description, produced_tags, consumed_tags}``. ``description`` is
  the short prose summary humans/agents read; the two tag arrays form
  MemoryBoard's logical index (concept produced / concept consumed)
  used by ``memoryboard_lookup`` for tag filtering. Invoked by the
  ChatFlowEngine's post-success hook; the model is
  ``chatflow.brief_model`` or ``chatflow.draft_model``.
params_schema:
  source_kind:
    type: string
    required: true
    description: >
      ChatNode kind: ``chat_turn`` / ``chat_compact`` / ``chat_merge`` /
      ``chat_pack``.
  user_message:
    type: string
    required: false
    description: >
      The turn's pre-check user input. Empty for merge / pack ChatNodes
      that lack an explicit user turn.
  agent_response:
    type: string
    required: true
    description: >
      The turn's final agent reply (compact summary / merged reply /
      pack summary as appropriate).
  max_produced_tags:
    type: integer
    required: true
    description: >
      Hard cap on ``produced_tags`` size, set per-chatflow (default 10).
  max_consumed_tags:
    type: integer
    required: true
    description: >
      Hard cap on ``consumed_tags`` size, set per-chatflow (default 8).
  ancestral_tags_active:
    type: string
    required: false
    description: >
      Space-separated list of ancestor concept tags still active on
      this chain. The brief uses these as anchors when filling
      ``consumed_tags`` — even if the current ChatNode's raw text
      doesn't repeat the words.
plan:
  description:
    text: "Emit a structured ChatNode brief with tags."
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "chat_brief_root"
      parent_ids: []
      step_kind: draft
      description:
        text: "Distill a ChatNode into JSON: description + tags."
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            You are a MemoryBoard summarizer. Distill ONE ChatNode into
            STRICT JSON output:

              {
                "description": "...",      // 1-2 sentence prose summary
                "produced_tags": [...],   // concepts this node OUTPUT covers
                "consumed_tags": [...]    // concepts this node INPUT references
              }

            ### description rules
              - Cover exactly two things: what the user asked/required
                this turn, and what the agent concluded/produced.
              - One or two sentences. No bullet points, no headings,
                no markdown, no code fences. Plain prose.
              - Preserve concrete anchors a future reader needs: tool
                names, file paths, numbers, explicit decisions, error
                names. Drop everything else. Do NOT write the ChatNode
                id — the system attaches it as metadata.
              - No speculation about downstream use. No restating the
                system prompt or narrating flow. No invention.
              - Neutral third person.
              - For ``chat_compact`` / ``chat_pack`` / ``chat_merge``:
                describe what was compressed/packed/merged and the
                takeaway.

            ### Tag naming convention (STRICT)
              - lowercase + underscore (snake_case). Example:
                ``retrieval_augmented_generation``, ``ivfflat_index``.
                NEVER use uppercase, spaces, hyphens, or dots.
              - Singular preferred: ``plan_x`` not ``plans_x``.
              - Status-suffix syntax ``concept_status`` ONLY when this
                node EXPLICITLY changes a concept's state:
                  ``plan_x_rejected``    plan X was rejected
                  ``plan_x_approved``    plan X was approved
                  ``plan_x_deferred``    plan X was deferred
                  ``plan_x_revived``     plan X was revived
                  ``plan_x_finalized``   plan X was finalized
                For ordinary discussion / refine, use the bare concept
                ``plan_x`` without a status suffix.

            ### produced_tags selection
              - Concepts this node's OUTPUT covers / introduces.
              - If the node changes a concept's status, use the
                status-suffixed tag.
              - Don't repeat ancestor anchors — those go in
                consumed_tags.

            ### consumed_tags selection (CRITICAL)
              - Concepts the node's INPUT/CONTEXT references / depends on.
              - If an ancestor anchor (listed below) is referenced /
                refined / rejected by this node — even if the raw text
                doesn't use the same word — INCLUDE that ancestor tag.
                This is what lets downstream ``memoryboard_lookup``
                catch this node when searching by the ancestor concept.
              - Example: ancestor active = ``plan_x``. The user this
                turn says "the previous proposal didn't work." Your
                produced_tags should include ``plan_x_rejected``;
                your consumed_tags should include ``plan_x``.

            ### Quantity limits
              - produced_tags up to N (see user message below).
              - consumed_tags up to M.
              - When this node neither produces nor consumes any
                concept, return empty arrays ``[]``.

            Output STRICT JSON only. No markdown fences, no leading
            commentary, no trailing notes.
        - role: user
          content: |
            ChatNode kind: {{ source_kind }}

            [Active ancestor concepts]
            {{ ancestral_tags_active or "(none)" }}

            [User input this turn]
            ---
            {{ user_message }}
            ---

            [Agent final reply this turn]
            ---
            {{ agent_response }}
            ---

            [Constraints]
            produced_tags up to {{ max_produced_tags }}
            consumed_tags up to {{ max_consumed_tags }}

            Output JSON:
  root_ids: ["chat_brief_root"]
