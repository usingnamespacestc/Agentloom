builtin_id: node_brief
name: "Node brief"
description: >
  MemoryBoard WorkNode-brief worker. Summarizes one source WorkNode
  into structured JSON: ``{description, produced_tags, consumed_tags}``.
  ``description`` populates the BoardItem prose; the tag arrays are
  the logical index used by ``memoryboard_lookup`` for tag filtering.
params_schema:
  source_kind:
    type: string
    required: true
    description: >
      The source WorkNode's step_kind. ``tool_call`` sources bypass
      this fixture entirely (code template path).
  source_inputs:
    type: string
    required: false
    description: >
      Rendered input messages with role prefix. May be empty.
  source_output:
    type: string
    required: true
    description: >
      Source node's output (``output_message.content`` /
      ``tool_result.content`` / ``compact_snapshot.summary``).
  max_produced_tags:
    type: integer
    required: true
    description: >
      Hard cap on ``produced_tags`` (default 10).
  max_consumed_tags:
    type: integer
    required: true
    description: >
      Hard cap on ``consumed_tags`` (default 8).
  ancestral_tags_active:
    type: string
    required: false
    description: >
      Space-separated active ancestor concept tags on this WorkFlow
      chain — used as anchors when filling ``consumed_tags``.
plan:
  description:
    text: "Emit a structured node brief with tags."
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "node_brief_root"
      parent_ids: []
      step_kind: draft
      description:
        text: "Distill a WorkNode into JSON: description + tags."
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            You are a MemoryBoard summarizer. Distill ONE WorkNode into
            STRICT JSON output:

              {
                "description": "...",      // 1-2 sentence prose summary
                "produced_tags": [...],   // concepts in OUTPUT
                "consumed_tags": [...]    // concepts referenced by INPUT
              }

            ### description rules
              - Cover exactly two things: what the source did (intent)
                and what it produced (takeaway).
              - One or two sentences. Plain prose. No markdown, lists,
                or code fences.
              - Preserve concrete anchors: tool names, file paths,
                numbers, decisions, error names. Drop everything else.
                Do NOT write node ids — system adds them as metadata.
              - No speculation about downstream use. No restating the
                prompt or narrating flow. No invention.
              - Neutral third person.

            ### Tag naming convention (STRICT)
              - lowercase + underscore (snake_case). Examples:
                ``read_file_op``, ``judge_pre_verdict``.
                NEVER uppercase, spaces, hyphens, dots.
              - Singular preferred.
              - Status-suffix syntax ``concept_status`` ONLY when this
                node EXPLICITLY changes a concept's state.

            ### produced / consumed selection
              - produced_tags: concepts the OUTPUT covers / introduces.
              - consumed_tags: concepts the INPUT references / depends on.
                **If an ancestor anchor (listed below) is referenced /
                refined / rejected by this node — even if the raw
                text doesn't use the same word — INCLUDE that ancestor
                tag.** This is what lets downstream tag-search catch
                this node.
              - Empty arrays ``[]`` when neither side has concepts.

            ### Quantity limits
              - produced_tags up to N, consumed_tags up to M
                (see user message below).

            Output STRICT JSON only. No markdown fences, no leading or
            trailing commentary.
        - role: user
          content: |
            Source node kind: {{ source_kind }}

            [Active ancestor concepts]
            {{ ancestral_tags_active or "(none)" }}

            [Source inputs]
            ---
            {{ source_inputs }}
            ---

            [Source output]
            ---
            {{ source_output }}
            ---

            [Constraints]
            produced_tags up to {{ max_produced_tags }}
            consumed_tags up to {{ max_consumed_tags }}

            Output JSON:
  root_ids: ["node_brief_root"]
