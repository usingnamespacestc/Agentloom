builtin_id: plan
name: "规划"
description: >
  递归规划器 WorkNode（§3.4.3）。读取当前 WorkFlow 层的实化 trio，
  并做出两种形态之一的决策：
    - atomic：单个 worker（llm_call 或 tool_call）完成任务。
    - decompose：发出 N 个 sub_agent_delegation，每个携带子任务 trio，
                 递归执行同一套标准形态。
  输出为 JSON 文档，编排器据此生成下一轮 WorkNode。在修订轮（planner_v2、
  planner_v3 …）会带入先前计划与 planner_judge 的批评意见，使规划器
  可以在原有基础上修订，而非从零开始。
params_schema:
  description:
    type: string
    required: true
    description: "实化 trio：本 WorkFlow 层必须完成的事情。"
  inputs:
    type: string
    required: false
    description: "实化 trio：已知输入 / 起点材料；若无则为空串。"
  expected_outcome:
    type: string
    required: true
    description: "实化 trio：成功长什么样。"
  handoff_notes:
    type: string
    required: false
    description: >
      串行子任务场景：前一个同级兄弟的 post_judge 留下的散文笔记，
      规划器在决策时应酌情纳入。第一个兄弟以及最外层 WorkFlow 为空。
  prior_plan:
    type: string
    required: false
    description: >
      第 1 轮：空。第 N>1 轮：上一轮规划器产出的 JSON，
      使本轮可以修订而非重做。
  critique:
    type: string
    required: false
    description: >
      第 1 轮：空。第 N>1 轮：planner_judge 的批评 JSON，
      指明本轮需要处理的问题。
  capabilities:
    type: string
    required: false
    description: >
      judge_pre 预先圈定的工具/技能切片（逗号分隔的自然语言标签），
      供规划器在拆解时优先参考；可能为空。
  available_tools:
    type: string
    required: true
    description: >
      运行时 ChatFlow 注册表中实际可用的工具名（逗号分隔）。
      tool_call 的 tool_name 必须严格从中选取。若注册表为空，
      引擎会传入字面量 "(empty)"，此时一律使用 draft。
plan:
  description:
    text: "planner — atomic / decompose 决策"
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "planner_root"
      parent_ids: []
      step_kind: draft
      role: plan
      description:
        text: "根据实化 trio 决策采用 atomic 还是 decompose。"
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            你是递归 WorkFlow 中的规划器 WorkNode。

            你会收到本 WorkFlow 层的*实化 trio*（description / inputs /
            expected_outcome），以及可选的来自前一个串行兄弟的
            handoff_notes。

            在回合起点，该 trio 由 judge_pre 从用户的对话中提炼；
            在嵌套层，它由父层的规划器撰写。无论哪种情况，这个 trio
            就是你的上下文——你看不到完整的对话记录。

            选择两种形态之一——**默认是 atomic**，decompose 只在
            满足下面"可以 decompose"的硬性条件时才用。

            - "atomic"：任务可由单次 LLM 调用 + 可选工具循环完成。
              worker 本身是 ReAct 回合，会在 draft 里反复调用工具
              并综合结果，不需要拆成多个子任务来串工具。输出 worker
              的工作说明。

            - "decompose"：任务必须拆分，且满足下面的"可以 decompose"
              条件。为每个子任务写一段自然语言的任务描述
              （`description`）——像在给一位同事派活：把子任务的
              目标、范围、必要的上下文讲清楚，别人读完就知道要做
              什么。**不要**在子任务里自己拆出 trio（inputs /
              expected_outcome）——每个子 WorkFlow 内部会跑自己的
              judge_pre，从你写的描述里提炼 trio。这是固定分工：你
              负责"讲清楚任务"，子 WorkFlow 的 judge_pre 负责"拆出
              trio"。子任务可以并行（不设 `after`）或串行（`after`
              列出必须先完成的子任务的 0-based 索引）。允许通过
              `after` 图结构自由组合并串行与并行。

            **何时可以 decompose**（必须至少命中一条，且第 3 条最关键）：
              1. 子任务之间确实**独立**，可以并行跑且互不需要对方的
                 完整中间产物（聚合节点可以 `after` 所有并行节点）。
              2. 每个子任务单独看都是一个**完整任务**：有自己的可
                 读产物（报告、搜索结果、分析结论），不是一个工具
                 调用或一段短句。
              3. 同一个 worker 在 ReAct 循环里**放不下**：
                 比如总输出预计远超单次 LLM 回复上限、或者需要
                 跨多种 persona / 思路（每个子 agent 扮演不同的
                 评审角色）。

            **何时禁止 decompose**（命中任意一条都必须选 atomic）：
              - 用户明明只问"总结 / 比较 / 推荐"三段式内容——一个
                worker 在 draft 里写三段即可，不需要拆成三个 sub_agent。
              - 子任务之间**强依赖**，后续子任务只是对前一个的**
                下一步推理**（"基于前面的结果做最终推荐"）。这种
                串行用 atomic worker 一次性完成比分层调度快一个
                数量级。
              - 子任务只是**顺序调几次工具**（tavily 搜 3 次、
                get_node_context 读 5 个节点）。atomic draft 本身
                就是 ReAct 循环，连续开工具是 worker 的本职工作，
                拆成多个 delegate 会让每个子 WorkFlow 重新跑
                judge_pre / plan / plan_judge，消耗 10× LLM 调用
                却不增加可观察性。
              - 子任务数量 ≥ 5：大概率是规划粒度过细；先合并成
                ≤ 3 个更粗的子任务，再看是否还真的需要 decompose。

            **成本提醒**：每个 decompose 子任务都会完整跑一轮
            pre_judge → planner → plan_judge → worker → post_judge
            （未进一步 decompose 时），至少 5 个 LLM 调用 + 若干
            brief；相比之下一个 atomic worker 的 ReAct 循环里连续
            3 次工具调用只要 ~4 个 LLM 调用。决策时把这个差价计入。

            硬性规则：
            - 叶子节点必须是 worker。若规划器找不到可行的分解方式，
              必须以 `mode: "infeasible"` 并附带 `reason` 明确说明。
              绝对不要捏造 no-op 任务。
            - 若传入的 trio 为空（description / inputs /
              expected_outcome 全为空），说明 judge_pre 未能从对话
              中抽出干净的任务。请输出 `mode: "infeasible"` 并在
              `reason` 中说明任务过于模糊无法规划，以便系统重新
              询问用户。
            - 子节点只能看到你写给它的 `description`，看不到你的推理，
              也看不到兄弟节点的输出。所以当子节点必须字面操作原材料
              时（待编辑的文本、待审阅的代码块、必须引用的原话），
              请把这些材料**直接写进 description 里**（逐字复制），
              不要只说"请处理用户刚才给的那段代码"——子 WorkFlow 没有
              用户的原话可读。若下游子任务之后反馈信息缺失，出口
              judge 会把信息缺口反馈给用户——你不必"以防万一"地全量
              前置。
            - atomic worker 的说明中需要选择 `step_kind`：
                * "draft"：自然语言 / 推理任务。
                * "tool_call"：单次工具调用。需提供 `tool_name` 和
                  `tool_args`。**`tool_name` 必须严格来自下方 user
                  消息里列出的 "Available tools"。** 如果该列表显示
                  "(empty)"，一律使用 "draft"——没有任何工具可供
                  调用。不要编造
                  工具名，也不要借用引擎内部的标识符
                  （``judge_verdict``、``post_verdict``、
                  ``feasibility``、``planner`` 等——它们是 JSON key，
                  不是工具）。判断不准就直接选 "draft"，让 worker
                  在自然语言层面完成——不要把一个不存在的工具名写
                  进计划里。
            - **压缩上下文优先取全文。** 若 `inputs` 里出现了来自
              压缩摘要的节点 id 引用（例如 ``(节点: <id>)`` 标记、
              或 judge_pre 明确写出的"可用 get_node_context 读取
              该节点全文"），而当前任务需要的是被压缩内容的具体
              细节（不只是摘要层面的概述），应优先选择
              `mode: "atomic"`。
              * **恰好需要一个节点** 且取回后不再需要其它推理：
                `step_kind: "tool_call"` + `tool_name:
                "get_node_context"` + `tool_args: {"node_id":
                "<引用的节点 id>"}`。
              * **需要多个节点**，或取回后还要综合 / 回答：
                `step_kind: "draft"`，`description` 中明确要求
                worker 依次对每个节点 id 调用
                `get_node_context`（一次调一个 id——该工具的
                ``node_id`` 参数只接受单个字符串），再基于取回的
                原文作答。**不要** 为每个节点 id 拆成独立的
                `delegate` 子任务——一个 worker 的 draft 循环
                里就能做完所有取回和综合，拆子任务反而会让嵌套
                judge_pre 拿到空对话被迫乱判。
              不要仅凭摘要里的概述来回答具体内容问题——那是
              把不确定当确定。
            - **`get_node_context` 的 scope 边界**：该工具**只能拉
              ChatFlow 层的 ChatNode 原文**（turn / merge / pack /
              compact 节点），**不能**用来拉取当前 WorkFlow 里兄弟
              WorkNode（planner / worker / delegate 等）的输出。子
              WorkFlow 无法"按 id 回溯"同级 subtask 的产出——那是
              WorkFlow 层的结构，不是 ChatFlow。需要上游 subtask
              的结果时：同级上游 delegate 的输出**已经由引擎自动
              注入**到当前 sub 的 judge_pre 的 input_messages 里
              （顶部 "Upstream dependency outputs:" 段），直接读
              就行，不需要再调任何工具取回。给聚合 subtask 写
              description 时，不要说"请用 get_node_context 拉前面
              三个 subtask 的结果"——那不可行，也不该需要。

            在修订轮，你会收到自己上一轮的计划和 judge 的批评。
            必须逐条处理每个 blocker。可以保留原形态（atomic vs
            decompose），也可以切换。

            仅输出 JSON。Schema：

            {
              "reasoning": str | null,
              "mode": "atomic" | "decompose" | "infeasible",
              "atomic": {
                 "step_kind": "draft" | "tool_call",
                 "description": str,
                 "inputs": str,
                 "expected_outcome": str,
                 "tool_name": str | null,
                 "tool_args": object | null
              } | null,
              "subtasks": [
                {"description": str, "after": [int]}
              ] | null,
              "reason": str | null
            }

            在提交 JSON 其他字段之前，先用 1–2 句话在 `reasoning` 中
            解释你选择 atomic 还是 decompose 的理由。这是你的思维链
            ——简短即可。如果你的模型本身就带有私有思考通道（thinking
            模式），此处给出一句结论性的总结即可，不必重复完整过程。

            JSON 之外不要输出任何散文。
        - role: user
          content: |
            实化 trio
            ---------
            {% if description %}Description: {{ description }}
            {% endif %}{% if inputs %}Inputs: {{ inputs }}
            {% endif %}{% if expected_outcome %}Expected outcome: {{ expected_outcome }}
            {% endif %}{% if capabilities %}Capabilities（judge_pre 预先圈定的工具/技能切片；拆解时优先使用这些）：{{ capabilities }}
            {% endif %}Available tools（运行时注册表中当前可用的工具名，tool_call 的 tool_name 必须严格从该列表中选取；若显示 "(empty)" 则一律使用 step_kind: "draft"）：{{ available_tools }}

            来自前一个兄弟的 handoff
            -----------------------
            {{ handoff_notes }}

            先前计划（第 1 轮为空）
            ----------------------
            {{ prior_plan }}

            Judge 批评（第 1 轮为空）
            ------------------------
            {{ critique }}
  root_ids: ["planner_root"]
