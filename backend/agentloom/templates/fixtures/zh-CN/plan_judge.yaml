builtin_id: plan_judge
name: "规划评判"
description: >
  评审 planner WorkNode 的输出（atomic brief 或 decomposition），
  关注可行性、覆盖度、时序以及遗漏的约束。返回 `during` 判定——
  `continue`（推进到 worker / 派生子任务）、`revise`（再辩论一轮）
  或 `halt`（作为不可行升交给 post_judge）。
params_schema:
  description:
    type: string
    required: true
    description: "正在规划的 WorkFlow 层的实化 trio。"
  inputs:
    type: string
    required: false
  expected_outcome:
    type: string
    required: true
  plan_json:
    type: string
    required: true
    description: "planner 最近一次 JSON 输出的原文。"
  round:
    type: string
    required: true
    description: >
      当前辩论轮次（从 1 开始，以字符串形式替换进来）。越到后期
      judge 越应宽松——前几轮还未被解决的顾虑通常不会被下一轮解决。
  round_budget:
    type: string
    required: true
    description: "本 WorkFlow 的辩论轮次硬上限。"
plan:
  description:
    text: "planner_judge —— 评审 plan"
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "planner_judge_root"
      parent_ids: []
      step_kind: judge_call
      judge_variant: during
      role: plan_judge
      description:
        text: "判断是推进、修订还是中止当前 plan。"
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            {% include '_critique_base' %}

            你是 planner_judge。planner 刚刚输出了一个 plan。
            在下列中选择其一：

            - "continue"：plan 覆盖了目标；如有 decomposition 则时序
              得当；如有 atomic worker brief 则具体到可执行。推进。
            - "revise"：  plan 存在可修复的问题。逐条列为 critiques，
              让 planner 下一轮处理。
            - "halt"：    plan 偏离到无法通过修订挽救（例如 planner
              直接输出了 `infeasible`）。升交到 post_judge。

            硬性规则：
            - 对于 "decompose" plan：检查子任务合起来是否覆盖父的
              expected_outcome；子任务是否引用了父 `inputs` 里不存在
              的数据；`after` 图是否无环；是否存在 no-op 子任务。
            - 对于 "atomic" plan：检查 worker brief 是否具备具体的
              inputs 和可度量的 expected_outcome。
            - 收敛压力：本轮是第 {{ round }} 轮，最多 {{ round_budget }}
              轮。到了后期，只要 plan 不是"明显错的"就该接受；nit 不
              算阻塞。

            返回 JSON：
              {"during_verdict": "continue"|"revise"|"halt",
               "critiques": [{"issue": str, "severity": "blocker"|"concern"|"nit",
                              "evidence": str}, ...]}
            不要输出其他散文。
        - role: user
          content: |
            实化 trio
            ---------
            {% if description %}Description: {{ description }}
            {% endif %}{% if inputs %}Inputs: {{ inputs }}
            {% endif %}{% if expected_outcome %}Expected outcome: {{ expected_outcome }}
            {% endif %}

            待评审 plan（第 {{ round }} / {{ round_budget }} 轮）
            --------------------------------------------------
            {{ plan_json }}
  root_ids: ["planner_judge_root"]
