builtin_id: node_brief
name: "节点简介"
description: >
  MemoryBoard WorkNode 简介 worker。把单个 source WorkNode 浓缩为
  ``{description, produced_tags, consumed_tags}`` 结构化 JSON。
  description 写入 BoardItem.description；两组 tags 是逻辑索引，
  ``memoryboard_lookup`` 按 tag 检索时使用。
params_schema:
  source_kind:
    type: string
    required: true
    description: >
      源 WorkNode 的 step_kind（``draft`` / ``judge_call`` /
      ``compact`` / ``delegate`` 等）。``tool_call`` 不会进入本 fixture
      （由代码模板生成 brief）。
  source_inputs:
    type: string
    required: false
    description: >
      渲染后的输入消息，每行一条（带 role 前缀）。无 ``input_messages``
      时可为空。
  source_output:
    type: string
    required: true
    description: >
      源节点的输出（llm/judge 读 ``output_message.content``，compact
      读 ``compact_snapshot.summary`` 等）。
  max_produced_tags:
    type: integer
    required: true
    description: >
      ``produced_tags`` 数量硬上限。chatflow 级配置（默认 10）。
  max_consumed_tags:
    type: integer
    required: true
    description: >
      ``consumed_tags`` 数量硬上限（默认 8）。
  ancestral_tags_active:
    type: string
    required: false
    description: >
      WorkFlow 链上仍活跃的祖先概念 tag（空格分隔），用作 anchor。
plan:
  description:
    text: "为源 WorkNode 输出结构化简介 + tags。"
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "node_brief_root"
      parent_ids: []
      step_kind: draft
      description:
        text: "蒸馏源 WorkNode 输入输出为 JSON。"
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            你是 MemoryBoard 总结器。把**一个**WorkNode 蒸馏为严格 JSON
            输出：

              {
                "description": "...",      // 一到两句散文摘要
                "produced_tags": [...],   // 输出涉及的概念
                "consumed_tags": [...]    // 输入引用/依赖的概念
              }

            ### description 写法
              - 涵盖两件事：节点意图（做什么），节点产出（结论/要点）。
              - 总共一到两句。纯散文，不要 markdown / 列表 / 代码围栏。
              - 保留具体锚点：工具名、文件路径、数字、决策、错误名。
              - 不写节点 id（系统会以元数据附加）。
              - 不推测下游用途，只描述发生了什么。
              - 不复述系统提示或流程。中立第三人称。

            ### tag 命名约定
              - 全小写 + underscore（snake_case）。例：
                ``read_file_op``、``judge_pre_verdict``。
                禁止大写、空格、连字符、点号。
              - 单数优先。
              - 状态后缀语法 ``concept_status``——仅当节点明确改变概念
                状态时使用。

            ### produced / consumed 选择
              - produced_tags：本节点输出涉及的概念。
              - consumed_tags：输入/上下文引用的概念。**祖先链上活跃的
                anchor tag 如果在本节点被引用/refine/反驳，必须填进
                consumed_tags（即使 raw text 没出现同样的词）**——
                这是为了让下游按 tag 检索时不漏掉本节点。
              - 既无产出也无引用时填空数组 ``[]``。

            ### 数量约束
              - produced_tags 最多 N 个、consumed_tags 最多 M 个
                （见下方 user 消息）。

            输出**严格 JSON 对象**。不要 markdown 围栏，不要前导/结尾
            注释。
        - role: user
          content: |
            源节点 kind：{{ source_kind }}

            【祖先活跃概念】
            {{ ancestral_tags_active or "（无）" }}

            【源节点输入】
            ---
            {{ source_inputs }}
            ---

            【源节点输出】
            ---
            {{ source_output }}
            ---

            【约束】
            produced_tags 最多 {{ max_produced_tags }} 个
            consumed_tags 最多 {{ max_consumed_tags }} 个

            输出 JSON：
  root_ids: ["node_brief_root"]
