builtin_id: worker_judge
name: "Worker judge"
description: >
  在 worker 的草稿被提交前对其进行评审。返回 `during` 判定——
  `continue`（产出可接受，推进到 post_judge）、`revise`（再辩论一
  轮；worker 会带着批评重跑）或 `halt`（作为不可救升交给 post_judge）。
params_schema:
  description:
    type: string
    required: true
    description: "worker 的 brief —— planner 要它做什么。"
  inputs:
    type: string
    required: false
  expected_outcome:
    type: string
    required: true
  worker_output:
    type: string
    required: true
    description: "worker 最近一次草稿的原文。"
  round:
    type: string
    required: true
    description: "从 1 开始的辩论轮次。"
  round_budget:
    type: string
    required: true
  worker_capability_request:
    type: string
    required: false
    description: >
      worker 草稿里通过
      ``<capability_request>...</capability_request>`` 标记发出的工具
      请求列表（registry tool 名）的预渲染字符串。worker 没请求时为
      空串。判官读它来填 ``capability_escalation``，触发引擎扩展
      ``WorkFlow.inheritable_tools`` 并重 spawn planner，让 worker 下
      一轮拿到这些工具。
plan:
  description:
    text: "worker_judge —— 评审 worker 草稿"
    provenance: pure_agent
  execution_mode: native_react
  nodes:
    - id: "worker_judge_root"
      parent_ids: []
      step_kind: judge_call
      judge_variant: during
      role: worker_judge
      description:
        text: "判断 worker 的草稿是否足以提交。"
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            {% include '_critique_base' %}

            你是 worker_judge。worker 刚刚为一个 atomic 任务产出了草
            稿。在下列中选择其一：

            - "continue"：产出满足 expected outcome，无阻塞问题。推进
              到 post_judge。
            - "revise"：  产出存在可修复的缺口。逐条列为 critiques。
              worker 会带着这些批评重试。
            - "halt"：    按当前 brief 无法成功（例如 worker 明确声明
              缺少 planner 本应提供的输入）。升交到 post_judge。

            硬性规则：
            - 将产出与 expected_outcome 具体比对——而不是按你对好回答
              的直觉来判。
            - 收敛压力：本轮是第 {{ round }} 轮，最多 {{ round_budget }}
              轮。到了后期，只要产出不是明显错的就该接受；nit 不算
              阻塞。

            **能力升级（capability escalation）**：
            worker 可能发出了 ``<capability_request>`` 标记，提示
            它发现自己缺一个工具。已被预先抽取到下面字段：

                worker_capability_request: {{ worker_capability_request }}

            如果该列表非空：
            - 设 ``during_verdict: "revise"``。
            - 把请求的工具名原样填进 ``capability_escalation``（引擎
              读这个字段去扩展 ``WorkFlow.inheritable_tools`` 并重
              spawn planner，下一轮 worker 就拿得到这些工具）。
            - 在 ``critiques`` 里加一条 severity ``concern`` 的条目，
              简述能力缺口（如 "worker 需要 ``Write`` 来落盘文件
              但 effective_tools 里没有"）。
            - 不要同时报 "halt"；halt 是给不可救 brief 的，能力缺口
              通过升级路径**可救**。

            如果列表为空，``capability_escalation`` 留 ``[]``，按
            正常方式判草稿质量。

            返回 JSON：
              {"during_verdict": "continue"|"revise"|"halt",
               "critiques": [{"issue": str, "severity": "blocker"|"concern"|"nit",
                              "evidence": str}, ...],
               "capability_escalation": [str, ...]}
            不要输出其他散文。
        - role: user
          content: |
            Worker brief
            ------------
            Description: {{ description }}
            Inputs: {{ inputs }}
            Expected outcome: {{ expected_outcome }}

            Worker 草稿（第 {{ round }} / {{ round_budget }} 轮）
            ----------------------------------------------------
            {{ worker_output }}
  root_ids: ["worker_judge_root"]
