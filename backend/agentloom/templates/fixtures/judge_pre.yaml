builtin_id: judge_pre
name: "Judge (pre)"
description: "Feasibility + input-completeness check before planning."
params_schema:
  description:
    type: string
    required: true
  inputs:
    type: string
    required: false
  expected_outcome:
    type: string
    required: false
plan:
  description:
    text: "judge_pre feasibility check"
    provenance: pure_agent
  execution_mode: direct
  nodes:
    - id: "judge_pre_root"
      parent_ids: []
      step_kind: judge_call
      judge_variant: pre
      description:
        text: "Is this WorkFlow's stated goal feasible with the given inputs?"
        provenance: pure_agent
      input_messages:
        - role: system
          content: |
            {% include '_critique_base' %}

            You are running the *pre* pass. Decide feasibility:
              - ok:         inputs + outcome are coherent; proceed.
              - risky:      proceed is possible but specific assumptions
                            must hold — list them as blockers.
              - infeasible: cannot succeed as stated — list why, list
                            what inputs would be required.

            Return JSON: {"feasibility": ..., "blockers": [...],
            "missing_inputs": [...]}. No other prose.
        - role: user
          content: |
            Description: {{ description }}
            Inputs: {{ inputs }}
            Expected outcome: {{ expected_outcome }}
  root_ids: ["judge_pre_root"]
